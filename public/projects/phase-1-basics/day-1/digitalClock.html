<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <link rel="shortcut icon" href="./assets/images/bg.jpg" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./style.css">
</head>

<body class="text-white">
    <div class="container user-select-none">

        <h1 class="text-center mt-5 widget fw-bold display-2 rounded-4 particle">Digital Clock</h1>

        <!-- clock -->
        <div class="d-flex widget gap-2 justify-content-center align-items-center shadow pt-5 pb-5 mt-5 rounded-5">
            <p class="hour m-0 fw-bolder display-1 w-25 text-center">00</p>
            <p class="fw-bolder display-1 m-0">:</p>
            <p class="minute m-0 fw-bolder display-1 w-25 text-center">00</p>
            <p class="fw-bolder display-1 m-0">:</p>
            <p class="second m-0 fw-bolder display-1 w-25 text-center">00</p>
        </div>


        <!-- other widgets -->
        <div class="row">
            <div class="col-md-5">
                <div
                    class="d-flex widget flex-column gap-2 fw-bolder justify-content-center align-items-center shadow p-5 mt-5 rounded-5">
                    <p class="m-0 fs-5">Time Spent</p>
                    <p class="m-0 timeSpent"></p>
                </div>
            </div>

            <div class="col-md-7">
                <div
                    class="d-flex widget flex-column gap-2 fw-bolder justify-content-center align-items-center shadow p-5 mt-5 rounded-5">
                    <p class="m-0 fs-5">Date</p>
                    <p class="m-0 date"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>

</html>
