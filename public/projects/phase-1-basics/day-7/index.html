<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager - Modern Todo App</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>

<body>

  <main class="container mx-auto min-h-screen flex flex-col justify-center items-center py-10 px-4">
    <div class="text-center mb-12">
      <h1 class="mb-2"><i class="fas fa-tasks mr-3"></i>Task Manager</h1>
      <p class="header-subtitle">Stay organized and productive</p>
    </div>

    <div id="todo-card" class="todo-card w-full lg:w-1/2 xl:w-2/5 rounded-2xl flex flex-col gap-6 p-8">
      
      <form class="flex gap-3" id="todoForm">
        <input id="taskInput" type="text" placeholder="What needs to be done?"
          class="rounded-lg px-5 py-3 outline-0 text-gray-800 w-full text-sm transition duration-300">
        <button type="submit" class="add-btn px-6 py-3 cursor-pointer rounded-lg font-medium whitespace-nowrap hover:shadow-lg">
          <i class="fas fa-plus mr-2"></i>Add
        </button>
      </form>

      <div class="divider-line h-px bg-gray-300"></div>

      <ul class="flex flex-col gap-3 w-full select-none max-h-96 overflow-y-auto" id="task-list">
        <div class="empty-state">
          <i class="fas fa-inbox"></i>
          <p class="text-sm">No tasks yet. Add one to get started!</p>
        </div>
      </ul>

    </div>
  </main>

  <script src="./script.js"></script>
</body>

</html>
